name: Nightly Builds

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  metadata:
    name: Nightly Metadata
    runs-on: ubuntu-latest
    outputs:
      base_version: ${{ steps.version.outputs.base_version }}
      version: ${{ steps.version.outputs.version }}
      version_tag: ${{ steps.version.outputs.version_tag }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      release_name: ${{ steps.version.outputs.release_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Compute nightly version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          base_version="$(python - <<'PY'
          import pathlib
          import re

          text = pathlib.Path("meson.build").read_text(encoding="utf-8")
          match = re.search(r"version:\s*'([^']+)'", text)
          if not match:
              raise SystemExit("failed to parse project version from meson.build")
          print(match.group(1))
          PY
          )"
          nightly_date="$(date -u +%Y%m%d)"
          short_sha="$(git rev-parse --short=8 HEAD)"
          run_id="${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"

          version="${base_version}-nightly.${nightly_date}.${run_id}+${short_sha}"
          version_tag="${base_version}-nightly.${nightly_date}.${run_id}-${short_sha}"
          release_tag="nightly-${version_tag}"
          release_name="OpenPrey Nightly ${version_tag}"

          echo "base_version=${base_version}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${version_tag}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "release_name=${release_name}" >> "$GITHUB_OUTPUT"

  nightly:
    name: ${{ matrix.label }}
    needs: metadata
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            label: Windows
            binary_arch: x64
            platform_backend: sdl3
            archive_format: zip
            archive_ext: .zip
          - os: ubuntu-latest
            platform: linux
            label: Linux
            binary_arch: x64
            platform_backend: sdl3
            archive_format: tar.xz
            archive_ext: .tar.xz
          - os: macos-latest
            platform: macos
            label: macOS
            binary_arch: arm64
            platform_backend: sdl3
            archive_format: tar.gz
            archive_ext: .tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Meson and Ninja
        run: |
          python -m pip install --upgrade pip
          python -m pip install meson ninja

      - name: Echo nightly version
        shell: bash
        run: |
          set -euo pipefail
          echo "Nightly version: ${{ needs.metadata.outputs.version }}"
          echo "Nightly version tag: ${{ needs.metadata.outputs.version_tag }}"

      - name: Install Linux native dependencies
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libglew-dev \
            libopenal-dev \
            libx11-dev \
            libxext-dev \
            libxxf86vm-dev

      - name: Install macOS native dependencies
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          brew install glew

      - name: Build and install (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:OPENPREY_SKIP_GAMELIBS_SYNC = "1"
          $env:OPENPREY_SKIP_GAMELIBS_BUILD = "1"

          powershell -ExecutionPolicy Bypass -File tools/build/meson_setup.ps1 setup --wipe builddir . --backend ninja --buildtype=release --wrap-mode=forcefallback -Dplatform_backend=${{ matrix.platform_backend }}
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          powershell -ExecutionPolicy Bypass -File tools/build/meson_setup.ps1 compile -C builddir
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          powershell -ExecutionPolicy Bypass -File tools/build/meson_setup.ps1 install -C builddir --no-rebuild --skip-subprojects
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build and install (Linux/macOS)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          export OPENPREY_SKIP_GAMELIBS_SYNC=1
          export OPENPREY_SKIP_GAMELIBS_BUILD=1

          bash tools/build/meson_setup.sh setup --wipe builddir . --backend ninja --buildtype=release --wrap-mode=default -Dplatform_backend=${{ matrix.platform_backend }}
          bash tools/build/meson_setup.sh compile -C builddir
          bash tools/build/meson_setup.sh install -C builddir --no-rebuild --skip-subprojects

      - name: Validate staged payload
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -d ".install/basepr" ]; then
            echo "Staged basepr payload directory is missing."
            exit 1
          fi

          has_payload_files="$(find ".install/basepr" -type f -print -quit 2>/dev/null || true)"
          if [ -z "${has_payload_files}" ]; then
            echo "Staged basepr payload directory has no files."
            exit 1
          fi

          case "${{ matrix.platform }}" in
            windows)
              client=".install/OpenPrey-client_${{ matrix.binary_arch }}.exe"
              ded=".install/OpenPrey-ded_${{ matrix.binary_arch }}.exe"
              game_module=".install/basepr/game_${{ matrix.binary_arch }}.dll"
              ;;
            linux)
              client=".install/OpenPrey-client_${{ matrix.binary_arch }}"
              ded=".install/OpenPrey-ded_${{ matrix.binary_arch }}"
              game_module=".install/basepr/game_${{ matrix.binary_arch }}.so"
              ;;
            macos)
              client=".install/OpenPrey-client_${{ matrix.binary_arch }}"
              ded=".install/OpenPrey-ded_${{ matrix.binary_arch }}"
              game_module=".install/basepr/game_${{ matrix.binary_arch }}.dylib"
              ;;
          esac

          if [ ! -f "${client}" ]; then
            echo "Missing staged client executable: ${client}"
            exit 1
          fi
          if [ ! -f "${ded}" ]; then
            echo "Missing staged dedicated executable: ${ded}"
            exit 1
          fi
          if [ ! -f "${game_module}" ]; then
            echo "Missing staged unified game module: ${game_module}"
            exit 1
          fi

          if [ "${{ matrix.platform }}" = "linux" ]; then
            if [ ! -f ".install/share/applications/openprey.desktop" ]; then
              echo "Missing Linux desktop entry in staged payload."
              exit 1
            fi
            if [ ! -f ".install/share/icons/hicolor/256x256/apps/openprey.png" ]; then
              echo "Missing Linux 256x256 icon in staged payload."
              exit 1
            fi
          fi

      - name: Prepare package
        id: package
        shell: bash
        run: |
          set -euo pipefail

          python tools/build/package_nightly.py \
            --platform "${{ matrix.platform }}" \
            --arch "${{ matrix.binary_arch }}" \
            --version "${{ needs.metadata.outputs.version }}" \
            --version-tag "${{ needs.metadata.outputs.version_tag }}" \
            --archive-format "${{ matrix.archive_format }}" \
            --source-root "${GITHUB_WORKSPACE}" \
            --output-dir "${RUNNER_TEMP}"

          archive_path="${RUNNER_TEMP}/openprey-${{ needs.metadata.outputs.version_tag }}-${{ matrix.platform }}${{ matrix.archive_ext }}"
          package_dir="${RUNNER_TEMP}/openprey-${{ needs.metadata.outputs.version_tag }}-${{ matrix.platform }}"
          if [ ! -f "${archive_path}" ]; then
            echo "Expected package archive not found: ${archive_path}"
            exit 1
          fi
          if [ ! -d "${package_dir}" ]; then
            echo "Expected package directory not found: ${package_dir}"
            exit 1
          fi
          echo "archive_path=${archive_path}" >> "$GITHUB_OUTPUT"
          echo "package_dir=${package_dir}" >> "$GITHUB_OUTPUT"

      - name: Validate macOS app bundle
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          app_root="${{ steps.package.outputs.package_dir }}/OpenPrey.app"
          app_plist="${app_root}/Contents/Info.plist"
          app_exec="${app_root}/Contents/MacOS/OpenPrey"
          app_icon="${app_root}/Contents/Resources/OpenPrey.icns"

          if [ ! -f "${app_plist}" ]; then
            echo "Missing macOS app Info.plist: ${app_plist}"
            exit 1
          fi
          if [ ! -x "${app_exec}" ]; then
            echo "Missing or non-executable macOS app launcher: ${app_exec}"
            exit 1
          fi
          if [ ! -f "${app_icon}" ]; then
            echo "Missing macOS app icon: ${app_icon}"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openprey-nightly-${{ needs.metadata.outputs.version_tag }}-${{ matrix.platform }}
          path: ${{ steps.package.outputs.archive_path }}
          if-no-files-found: error

  release:
    name: Publish Nightly Release
    needs: [metadata, nightly]
    if: ${{ needs.nightly.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags origin

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: openprey-nightly-${{ needs.metadata.outputs.version_tag }}-*
          path: ${{ runner.temp }}/nightly-artifacts
          merge-multiple: true

      - name: Verify platform archives
        shell: bash
        run: |
          set -euo pipefail

          artifact_dir="${RUNNER_TEMP}/nightly-artifacts"
          if [ ! -d "${artifact_dir}" ]; then
            echo "Artifact directory is missing: ${artifact_dir}"
            exit 1
          fi

          ls -lah "${artifact_dir}"

          expected=(
            "openprey-${{ needs.metadata.outputs.version_tag }}-windows.zip"
            "openprey-${{ needs.metadata.outputs.version_tag }}-linux.tar.xz"
            "openprey-${{ needs.metadata.outputs.version_tag }}-macos.tar.gz"
          )

          missing=0
          for package_file in "${expected[@]}"; do
            if [ ! -f "${artifact_dir}/${package_file}" ]; then
              echo "Missing expected package archive: ${package_file}"
              missing=1
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Generate changelog
        shell: bash
        run: |
          set -euo pipefail

          python tools/build/generate_nightly_changelog.py \
            --version "${{ needs.metadata.outputs.version }}" \
            --version-tag "${{ needs.metadata.outputs.version_tag }}" \
            --release-tag "${{ needs.metadata.outputs.release_tag }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --output "${RUNNER_TEMP}/nightly-changelog.md"

      - name: Create or update nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ needs.metadata.outputs.release_tag }}"
          name="${{ needs.metadata.outputs.release_name }}"
          notes="${RUNNER_TEMP}/nightly-changelog.md"
          assets_dir="${RUNNER_TEMP}/nightly-artifacts"
          mapfile -t assets < <(find "${assets_dir}" -maxdepth 1 -type f | sort)

          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets were downloaded."
            exit 1
          fi

          if gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${tag}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${name}" \
              --notes-file "${notes}" \
              --latest=false
            gh release upload "${tag}" "${assets[@]}" --repo "${GITHUB_REPOSITORY}" --clobber
          else
            gh release create "${tag}" "${assets[@]}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${name}" \
              --notes-file "${notes}" \
              --latest=false
          fi

          release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}" --jq .id)"
          gh api \
            --method PATCH \
            "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
            -f prerelease=false \
            -f draft=false >/dev/null
