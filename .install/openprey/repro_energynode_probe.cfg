printHandInfo

_impulse1
wait 2
printHandInfo
_impulse2
wait 2
printHandInfo
_impulse3
wait 2
printHandInfo
_impulse4
wait 2
printHandInfo
_impulse5
wait 2
printHandInfo
_impulse6
wait 2
printHandInfo
_impulse7
wait 2
printHandInfo
_impulse8
wait 2
printHandInfo
_impulse9
wait 2
printHandInfo
_impulse10
wait 2
printHandInfo
_impulse11
wait 2
printHandInfo
_impulse12
wait 2
printHandInfo

spawn object_energynode_plasma name probe_node def_energy energy_plasma mins "-128 -128 -128" maxs "128 128 128"
wait 2
listEntities object_energynode
listEntities probe_node
listSpawnArgs probe_node
printThis

_attackalt
wait 120
-attackalt
wait 20
printHandInfo

disconnect
echo ENERGYNODE_PROBE_AFTER_DISCONNECT
wait 20
quit
echo ENERGYNODE_PROBE_AFTER_QUIT
